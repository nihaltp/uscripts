pull_request_rules:
  - name: Ping PR author when conflicting
    description: Warn the pull request author when their PR are conflicting
    conditions:
      - conflict
      - -closed
    actions:
      comment:
        message: >
          👋 {{author}} your PR is conflicting and needs to be updated to be
          merged
  - name: Make sure PR are up to date before merging
    description: This automatically updates PRs when they are out-of-date with the
      base branch to avoid semantic conflicts (next step is using a merge queue).
    conditions: []
    actions:
      update:
  - name: Make sure PR are almost up to date before merging
    description: This automatically updates PRs when they are out-of-date with the
      base branch to avoid semantic conflicts (next step is using a merge queue).
    conditions:
      - "#commits-behind >= 10"
    actions:
      update:
  - name: Make sure PR are up to date before merging with rebase
    description: This automatically rebases PRs when they are out-of-date with the
      base branch to avoid semantic conflicts (next step is using a merge queue).
    conditions: []
    actions:
      rebase:
  - name: auto-merge PRs created by nihaltp on snyk-upgrade-* branches
    conditions:
      - author=nihaltp
      - head~=^snyk-(upgrade|fix)-.*$
      - "#check-failure=0"
      - "#check-pending=0"
      - -conflict
      - "#approved-reviews-by>=0"
    actions:
      merge:
        method: squash
  - name: auto-merge PRs by vercel bot
    conditions:
      - author=vercel[bot]
      - head~=^vercel/.*
      - "#check-failure=0"
      - "#check-pending=0"
      - -conflict
      - "#approved-reviews-by>=0"
    actions:
      merge:
        method: squash

  - name: auto-merge PRs created by dependabot
    conditions:
      - author=dependabot[bot]
      - "#check-failure=0"
      - "#check-pending=0"
      - -conflict
      - "#approved-reviews-by>=0"
    actions:
      merge:
        method: squash
